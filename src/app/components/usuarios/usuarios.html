<p-toast position="top-right" />

<div class="usuarios-page">
  <p-breadcrumb [model]="breadcrumbItems" [home]="breadcrumbHome" styleClass="mb-4" />

  <div class="usuarios-header">
    <div>
      <h1 class="usuarios-title">Usuarios</h1>
      <p class="usuarios-subtitle">Gestión y administración de usuarios registrados en el sistema.</p>
    </div>
    <div class="usuarios-actions">
      <span class="total-badge">Total: {{ totalUsuarios() }}</span>
    </div>
  </div>

  <p-table
    [value]="usuarios()"
    [paginator]="true"
    [rows]="8"
    [rowsPerPageOptions]="[8, 16, 32]"
    dataKey="id"
    styleClass="p-datatable-sm p-datatable-striped"
    [globalFilterFields]="['nombre', 'correo', 'grupo', 'rol']"
    #dt
  >
    <ng-template pTemplate="caption">
      <div class="flex align-items-center gap-2">
        <span class="p-input-icon-left">
          <i class="pi pi-search"></i>
          <input
            pInputText
            type="text"
            (input)="dt.filterGlobal($any($event.target).value, 'contains')"
            placeholder="Buscar usuario..."
          />
        </span>
      </div>
    </ng-template>

    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="nombre" style="min-width: 12rem">
          Nombre <p-sortIcon field="nombre" />
        </th>
        <th pSortableColumn="grupo" style="min-width: 9rem">
          Grupo <p-sortIcon field="grupo" />
        </th>
        <th pSortableColumn="rol" style="min-width: 8rem">
          Rol <p-sortIcon field="rol" />
        </th>
        <th pSortableColumn="correo" style="min-width: 12rem">
          Correo <p-sortIcon field="correo" />
        </th>
        <th style="min-width: 7rem">Estatus</th>
        <th style="width: 8rem">Acciones</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-usuario>
      <tr>
        <td>
          <span class="font-semibold">{{ usuario.nombre }}</span>
        </td>
        <td>
          <span class="cell-truncate" style="max-width: 8rem" [pTooltip]="usuario.grupo">
            {{ usuario.grupo }}
          </span>
        </td>
        <td>
          <p-tag [value]="rolLabel(usuario.rol)" [severity]="rolSeverity(usuario.rol)" />
        </td>
        <td>
          <span class="cell-truncate text-color-secondary" style="max-width: 11rem" [pTooltip]="usuario.correo">
            {{ usuario.correo }}
          </span>
        </td>
        <td>
          <p-tag value="Activo" severity="success" />
        </td>
        <td>
          <div class="flex gap-1">
            <p-button
              icon="pi pi-pencil"
              [text]="true"
              [rounded]="true"
              severity="warn"
              (onClick)="notifyEdit(usuario)"
              pTooltip="Editar"
            />
            <p-button
              icon="pi pi-trash"
              [text]="true"
              [rounded]="true"
              severity="danger"
              (onClick)="notifyDelete(usuario)"
              pTooltip="Eliminar"
            />
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="6" class="text-center p-4">
          <i class="pi pi-users text-4xl text-300 block mb-2"></i>
          <span class="text-500">No hay usuarios registrados</span>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
